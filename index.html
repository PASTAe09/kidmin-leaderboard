<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kids Ministry Dashboard</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; line-height: 1.5; }
    .header { background: #1e3a5f; padding: 20px; border-bottom: 3px solid #3b82f6; display: flex; justify-content: space-between; align-items: center; }
    .container { max-width: 500px; margin: 50px auto; background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
    input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
    .btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    #dashboard { display: none; padding: 20px; }
    .teams-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .team-card { background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
    .person-row { padding: 8px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }
    .status-C { color: #4ade80; } .status-D { color: #f87171; text-decoration: line-through; }
  </style>
</head>
<body>

<div id="setupPanel">
  <div class="header"><h1>Kids Ministry Setup</h1></div>
  <div class="container">
    <div class="form-group">
      <label>Client ID</label>
      <input type="text" id="clientId">
    </div>
    <div class="form-group">
      <label>Client Secret</label>
      <input type="password" id="clientSecret">
    </div>
    <button class="btn" onclick="connect()">Connect to PCO</button>
  </div>
</div>

<div id="dashboard">
  <div class="header">
    <h1 id="dashTitle">Loading...</h1>
    <button onclick="location.reload()" style="background:#334155; color:white; border:none; padding:8px 12px; border-radius:4px; cursor:pointer;">Logout</button>
  </div>
  <div id="statusUpdate" style="padding: 20px; text-align: center;"></div>
  <div id="mainContent" class="teams-grid"></div>
</div>

<script>
const SERVICE_TYPE_ID = '220905';
const TEAM_ORDER = ['5616258', '5750692', '5993641', '5993644'];
const TEAM_NAMES = { '5616258': 'Adventure Land', '5750692': 'Small Town', '5993641': 'Brandywine Buddies', '5993644': 'KidMin Host & Check-In' };

function connect() {
  const id = document.getElementById('clientId').value.trim();
  const sec = document.getElementById('clientSecret').value.trim();
  if (!id || !sec) return alert("Missing credentials");

  localStorage.setItem('pco_id', id);
  localStorage.setItem('pco_sec', sec);
  
  document.getElementById('setupPanel').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  startLoading(id, sec);
}

async function startLoading(id, sec) {
  const status = document.getElementById('statusUpdate');
  const auth = btoa(id + ":" + sec);
  const proxy = "https://corsproxy.io/?";

  try {
    status.innerText = "Attempting to bypass CORS and reach PCO...";
    
    // 1. Get Plan
    const planUrl = `https://api.planningcenteronline.com/services/v2/service_types/${SERVICE_TYPE_ID}/plans?filter=future&per_page=1`;
    const planRes = await fetch(proxy + encodeURIComponent(planUrl), {
      headers: { 'Authorization': 'Basic ' + auth }
    });
    
    if (!planRes.ok) throw new Error(`PCO Login Failed (${planRes.status})`);
    
    const planData = await planRes.json();
    const plan = planData.data[0];
    document.getElementById('dashTitle').innerText = plan.attributes.dates;

    // 2. Get Members
    status.innerText = "Grabbing the roster...";
    const teamUrl = `https://api.planningcenteronline.com/services/v2/service_types/${SERVICE_TYPE_ID}/plans/${plan.id}/team_members?per_page=150`;
    const teamRes = await fetch(proxy + encodeURIComponent(teamUrl), {
      headers: { 'Authorization': 'Basic ' + auth }
    });
    const teamData = await teamRes.json();
    
    render(teamData.data);
    status.style.display = 'none';

  } catch (err) {
    status.innerHTML = `<div style="color:#f87171; border:1px solid #7f1d1d; padding:20px; border-radius:8px;">
      <h3>Proxy Connection Failed</h3>
      <p>${err.message}</p>
      <p style="font-size:12px; color:#94a3b8;">If you see this, the code HAS updated, but the Planning Center API rejected the request. Check your credentials!</p>
    </div>`;
  }
}

function render(members) {
  const container = document.getElementById('mainContent');
  container.innerHTML = TEAM_ORDER.map(tid => {
    const people = members.filter(m => m.relationships.team.data.id === tid);
    return `
      <div class="team-card">
        <h3 style="border-bottom:1px solid #334155; padding-bottom:10px;">${TEAM_NAMES[tid]}</h3>
        ${people.map(p => `
          <div class="person-row">
            <span>${p.attributes.name}</span>
            <span class="status-${p.attributes.status}">${p.attributes.status === 'C' ? '✔' : '?'}</span>
          </div>
        `).join('') || '<p style="color:#64748b">None scheduled</p>'}
      </div>`;
  }).join('');
}

window.onload = () => {
  const sid = localStorage.getItem('pco_id');
  const ssec = localStorage.getItem('pco_sec');
  if (sid) document.getElementById('clientId').value = sid;
  if (ssec) document.getElementById('clientSecret').value = ssec;
};
</script>
</body>
</html>
